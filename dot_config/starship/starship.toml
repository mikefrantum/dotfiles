# Starship Configuration

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$line_break\
$character """

# Right side prompt
right_format = ""

add_newline = true

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[username]
show_always = true
format = "[$user]($style)"
style_user = "green bold"

[hostname]
ssh_only = false
format = "[@$hostname]($style) "
style = "green bold"

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "cyan bold"
read_only = " 🔒"
read_only_style = "red"
home_symbol = "~"

[git_branch]
symbol = "🌱 "
format = "on [$symbol$branch]($style) "
style = "purple bold"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "red bold"
conflicted = "🏳"
up_to_date = "✓"
untracked = "🤷"
stashed = "📦"
modified = "📝"
staged = '[++\($count\)](green)'
renamed = "👅"
deleted = "🗑"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"

